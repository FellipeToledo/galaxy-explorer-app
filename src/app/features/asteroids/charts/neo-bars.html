<figure class="chart">
  <figcaption>
    <span class="chart-title">{{ 'neo.chartBars.title' | t }}</span>
    <span class="chart-sub">{{ 'neo.chartBars.sub' | t }}</span>
  </figcaption>

  <ul class="legend">
    <li><span class="swatch safe" aria-hidden="true"></span>{{ 'neo.legend.safe' | t }}</li>
    <li><span class="swatch hazard" aria-hidden="true"></span>{{ 'neo.legend.hazard' | t }}</li>
  </ul>

  <div class="plot">
    <!-- role=group (não img): com role="img" o leitor de tela IGNORA o conteúdo
         interno, e os alvos focáveis abaixo viram paradas mudas no Tab. Cada
         coluna se anuncia sozinha; a tabela da página segue como leitura
         completa. -->
    <svg
      [attr.viewBox]="'0 0 ' + viewW + ' ' + viewH"
      role="group"
      [attr.aria-label]="'neo.chartBars.aria' | t"
    >
      <!-- Grade e eixo: hairlines sólidas, um passo acima da superfície -->
      @for (tick of yTicks(); track tick.value) {
        <line class="grid" x1="44" [attr.y1]="tick.y" [attr.x2]="viewW - 14" [attr.y2]="tick.y" />
        <text class="tick" x="36" [attr.y]="tick.y + 4" text-anchor="end">{{ tick.value }}</text>
      }
      <line class="axis" x1="44" [attr.y1]="plotBottom" [attr.x2]="viewW - 14" [attr.y2]="plotBottom" />

      @for (col of columns(); track col.date) {
        <g>
          @for (seg of col.segments; track $index) {
            <path [attr.d]="seg.path" [class.hazard]="seg.hazardous" [class.safe]="!seg.hazardous" />
          }
          @if (col.labelValue) {
            <text class="cap-label" [attr.x]="col.centerX" [attr.y]="col.topY - 8" text-anchor="middle">
              {{ col.labelValue }}
            </text>
          }
          @if (col.showTick) {
            <text class="tick" [attr.x]="col.centerX" [attr.y]="plotBottom + 20" text-anchor="middle">
              {{ col.date | date: 'dd/MM' : 'UTC' : translate.lang() }}
            </text>
          }
          <!-- Alvo de hover/foco: a faixa inteira, não só a coluna.
               O aria-label diz o mesmo que o tooltip: quem usa teclado ou
               leitor não depende do hover para ler o valor. -->
          <rect
            class="hit"
            tabindex="0"
            role="img"
            [attr.aria-label]="
              'neo.chartBars.dayAria'
                | t
                  : {
                      date: (col.date | date: 'longDate' : 'UTC' : translate.lang()) ?? col.date,
                      total: col.data.total,
                      hazard: col.data.hazardous
                    }
            "
            [attr.x]="col.hitX"
            y="18"
            [attr.width]="col.hitW"
            [attr.height]="plotBottom - 18"
            (mouseenter)="hover(col)"
            (mouseleave)="hover(null)"
            (focus)="hover(col)"
            (blur)="hover(null)"
          />
        </g>
      }
    </svg>

    @if (hovered(); as col) {
      <div class="tooltip" [style.left.%]="tipLeft()" [style.top.%]="tipTop()" role="status">
        <strong>{{ col.date | date: 'longDate' : 'UTC' : translate.lang() }}</strong>
        <span>{{ 'neo.tooltip.total' | t: { count: col.data.total } }}</span>
        <span class="tt-hazard">{{ 'neo.tooltip.hazard' | t: { count: col.data.hazardous } }}</span>
      </div>
    }
  </div>
</figure>
