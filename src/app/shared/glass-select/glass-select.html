<div class="gs" [class.open]="open()" [style.min-width]="minWidth()">
  <button
    type="button"
    class="gs-trigger"
    (click)="toggle()"
    [attr.aria-expanded]="open()"
    [attr.aria-label]="ariaLabel() || null"
    aria-haspopup="listbox"
  >
    <span class="gs-value">{{ selectedLabel() }}</span>
    <span class="gs-chevron" aria-hidden="true"></span>
  </button>

  <div class="gs-panel" role="listbox">
    <ul class="gs-list">
      @for (opt of options(); track opt.value; let i = $index) {
        <li
          class="gs-option"
          role="option"
          [class.selected]="opt.value === value()"
          [class.active]="i === activeIndex()"
          [attr.aria-selected]="opt.value === value()"
          (click)="select(opt.value)"
          (mouseenter)="activeIndex.set(i)"
        >
          <span class="gs-label">{{ opt.label }}</span>
          @if (opt.value === value()) {
            <span class="gs-check" aria-hidden="true">✓</span>
          }
        </li>
      }
    </ul>
  </div>
</div>
