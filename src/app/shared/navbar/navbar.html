<header class="nav glass">
  <a routerLink="/" class="brand" [attr.aria-label]="'nav.brandAria' | t">
    <span class="logo" aria-hidden="true">🪐</span>
    <span class="brand-text">Galaxy<span class="gradient-text">Explorer</span></span>
  </a>

  <div class="nav-right">
    <nav class="links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ 'nav.apod' | t }}
      </a>
      <a routerLink="/mars" routerLinkActive="active">{{ 'nav.mars' | t }}</a>
      <a routerLink="/asteroids" routerLinkActive="active">{{ 'nav.asteroids' | t }}</a>
      <a routerLink="/earth" routerLinkActive="active">{{ 'nav.earth' | t }}</a>
      <a routerLink="/media" routerLinkActive="active">{{ 'nav.media' | t }}</a>
    </nav>

    <app-glass-select
      class="lang-select"
      [options]="langOptions"
      [value]="currentLang()"
      (valueChange)="onLangChange($event)"
      minWidth="140px"
      [ariaLabel]="'nav.language' | t"
    />
  </div>
</header>
